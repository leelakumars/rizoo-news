name: Generate News Feed

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

concurrency:
  group: news-feed
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate feed
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 scripts/generate_news_feed.py

      - name: Copy output to root
        run: |
          if [ -f news-feed/output/feed.json ]; then
            cp news-feed/output/feed.json feed.json
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update feed $(date -u +%Y-%m-%d_%H:%M)"
          # Retry push with force-resolve on conflict (each run generates complete feed)
          for i in 1 2 3; do
            git pull --rebase -X theirs && git push && exit 0
            echo "Push attempt $i failed, retrying..."
            git rebase --abort 2>/dev/null || true
            git pull --rebase -X theirs || true
          done
          echo "All push attempts failed"
          exit 1
