name: Generate News Feed

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: news-feed
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate feed
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 scripts/generate_news_feed.py

      - name: Deploy feed.json
        run: |
          if [ ! -f news-feed/output/feed.json ]; then
            echo "No feed generated, skipping"
            exit 0
          fi

          # Copy generated feed to repo root
          cp news-feed/output/feed.json feed.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.json
          git diff --cached --quiet && echo "No changes to feed" && exit 0

          git commit -m "Update feed $(date -u +%Y-%m-%d_%H:%M)"

          # Simple push with retry - if it fails, reset to remote and recommit
          if ! git push; then
            echo "Push failed (likely concurrent update), rebasing..."
            git fetch origin main
            git reset --soft origin/main
            git checkout origin/main -- feed.json 2>/dev/null || true
            cp news-feed/output/feed.json feed.json
            git add feed.json
            git diff --cached --quiet && echo "No diff after reset" && exit 0
            git commit -m "Update feed $(date -u +%Y-%m-%d_%H:%M)"
            git push
          fi
